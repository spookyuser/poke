              type: boolean
            label:
              type: string
            route:
              type: string
        delivery_address:
          type: object
          nullable: true
        pick_up_point:
          type: object
          nullable: true
        is_gift:
          type: boolean
        is_postal_gift:
          type: boolean
        delivery_price:
          type: integer
        _total:
          type: number
          description: Total in rands (human-readable)
          example: 104
        total:
          type: integer
          description: Total in cents
          example: 10400
        min_order:
          type: string
        delivery_min_order:
          type: integer
        allergen_data:
          type: array
          items:
            type: object
        cutoffTime:
          type: integer
          description: Unix timestamp in milliseconds
        table_name:
          type: string
          nullable: true
        service_charge_percentage:
          type: number
        service_charge_value:
