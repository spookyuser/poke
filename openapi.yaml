    CreateYocoOrderRequest:
      type: object
      required:
        - items
        - payment_token
        - business_location_id
        - order_type
        - total
        - mobile
        - currency
      properties:
        items:
          type: array
          description: Cart items, each wrapping a MenuItem/MenuDeal with full customization data
          items:
            type: object
            properties:
              item:
                $ref: "#/components/schemas/MenuItem"
              quantity:
                type: integer
                default: 1
              special_instructions:
                type: string
        applicable_vouchers:
          type: array
          items:
            type: object
        applied_gift_cards:
          type: array
          items:
            type: object
        payment_token:
          type: string
          example: "yoco"
        pay_on_collection:
          type: boolean
        discount_applied:
          type: integer
        business_location_id:
          type: string
          example: "613f5c8957e9945b0801324c"
        collection_time:
          type: string
          description: "'asap' or ISO datetime"
          example: "asap"
        mobile:
          type: string
          example: "+27718365958"
        mobile_code:
          type: string
          example: "+27"
        mobile_value:
          type: string
          example: "718365958"
        currency:
          type: string
          example: "zar"
        order_type:
          type: string
          enum: [collection, delivery, table]
          example: "collection"
        delivery_option:
          type: object
          properties:
            description:
