    YocoCheckout:
      type: object
      description: Yoco payment checkout session. Redirect the user to `redirectUrl` to complete payment.
      properties:
        id:
          type: string
          example: "ch_4EX8rqA2nyzhwaJCz9OiPwEN"
        redirectUrl:
          type: string
          format: uri
          description: URL to redirect the user to for payment
          example: "https://c.yoco.com/checkout/ch_4EX8rqA2nyzhwaJCz9OiPwEN"
        status:
          type: string
          enum: [created, pending, completed, failed]
          example: "created"
        amount:
          type: integer
          description: Amount in cents
          example: 10400
        currency:
          type: string
          example: "ZAR"
        paymentId:
          type: string
          nullable: true
        successUrl:
          type: string
          format: uri
        cancelUrl:
          type: string
          format: uri
        failureUrl:
          type: string
          format: uri
        metadata:
          type: object
          properties:
            order_id:
              type: integer
            client_id:
              type: integer
            checkoutId:
              type: string
            paymentFacilitator:
              type: string
            domain:
              type: string
        merchantId:
          type: string
        totalDiscount:
          type: number
          nullable: true
        totalTaxAmount:
          type: number
          nullable: true
        subtotalAmount:
          type: number
          nullable: true
        lineItems:
          type: array
          nullable: true
          items:
            type: object
        processingMode:
          type: string
          enum: [live, test]
